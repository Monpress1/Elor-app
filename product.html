<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELOR | Product Details</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>

    <style>
        :root {
            --bg-deep: #0a0a0a; 
            --bg-card: #121212; 
            --accent-gold: #D4AF37; 
            --accent-gold-soft: rgba(212, 175, 55, 0.2); 
            --text-main: #F8F8FF; 
            --text-muted: #888888;
            --danger: #ff4c4c;
            --font-serif: 'Playfair Display', serif; 
            --font-sans: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-sans); 
            overflow-x: hidden; 
        }

        /* --- NAVIGATION --- */
        .header { 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(10, 10, 10, 0.95); 
            backdrop-filter: blur(10px); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid var(--accent-gold-soft); 
        }
        .back-btn { color: var(--text-main); font-size: 1.2rem; cursor: pointer; text-decoration: none; }
        .logo { 
            font-family: var(--font-serif); 
            font-size: 1.5rem; 
            color: var(--accent-gold); 
            letter-spacing: 3px; 
            font-weight: 700; 
            text-decoration: none; 
        }

        /* --- PRODUCT HERO --- */
        .product-hero { width: 100%; display: flex; flex-direction: column; }
        .product-img-wrapper { 
            width: 100%; 
            height: 65vh; 
            background: #111; 
            position: relative; 
            overflow: hidden;
        }
        .product-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            animation: imageFade 0.8s ease-in;
        }
        @keyframes imageFade { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
        
        .product-details { 
            padding: 35px 25px; 
            background: var(--bg-card); 
            border-top: 1px solid rgba(255,255,255,0.05); 
            border-radius: 30px 30px 0 0;
            margin-top: -30px;
            position: relative;
            z-index: 10;
        }
        .product-title { 
            font-family: var(--font-serif); 
            font-size: 2.2rem; 
            margin-bottom: 8px; 
            font-weight: 600; 
            line-height: 1.2;
        }
        .likes-counter { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .product-price { 
            color: var(--accent-gold); 
            font-size: 1.6rem; 
            font-weight: 500; 
            margin-bottom: 25px; 
            font-family: var(--font-serif);
        }
        .product-desc { 
            font-size: 0.95rem; 
            color: #b0b0b0; 
            line-height: 1.8; 
            margin-bottom: 35px; 
            font-weight: 300;
        }

        /* --- ACTIONS --- */
        .action-group { display: flex; flex-direction: column; gap: 15px; }
        
        .btn-pay { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent-gold); 
            color: #0a0a0a; 
            border: none; 
            border-radius: 8px; 
            font-family: var(--font-sans); 
            font-size: 0.9rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn-pay:active { transform: scale(0.98); opacity: 0.9; }
        
        .secondary-actions { display: flex; gap: 12px; }
        
        .btn-chat { 
            flex: 1; 
            padding: 18px; 
            background: transparent; 
            color: var(--text-main); 
            border: 1px solid var(--accent-gold-soft); 
            border-radius: 8px; 
            font-size: 0.8rem; 
            font-weight: 600;
            text-transform: uppercase; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 12px; 
            position: relative; 
            transition: 0.3s;
        }
        .btn-chat:hover { background: var(--accent-gold-soft); }

        .btn-like { 
            width: 65px; 
            background: transparent; 
            color: var(--text-muted); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.3rem; 
            transition: 0.3s; 
        }
        .btn-like.active { color: var(--danger); border-color: var(--danger); background: rgba(255, 76, 76, 0.05); }

        /* Notification Pulse */
        .pulse-dot { 
            position: absolute; 
            top: 12px; 
            right: 15px; 
            width: 10px; 
            height: 10px; 
            background: var(--danger); 
            border-radius: 50%; 
            display: none; 
            border: 2px solid var(--bg-card);
        }
        .pulse-dot.active { display: block; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 76, 76, 0.7); } 
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255, 76, 76, 0); } 
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 76, 76, 0); } 
        }

        /* --- RECOMMENDATIONS --- */
        .recom-section { padding: 50px 20px; background: var(--bg-deep); }
        .section-title { 
            font-family: var(--font-serif); 
            font-size: 1.6rem; 
            margin-bottom: 25px; 
            text-align: center; 
            color: var(--accent-gold); 
            letter-spacing: 1px;
        }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card:active { transform: scale(0.97); }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; }
        .card-title { font-family: var(--font-serif); font-size: 0.95rem; margin-bottom: 5px; color: #fff; }
        .card-price { color: var(--accent-gold); font-size: 0.85rem; font-weight: 500; }

        /* --- CHAT MODAL --- */
        .modal { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); 
            z-index: 3000; 
            display: none; 
            align-items: flex-end; 
            backdrop-filter: blur(5px);
        }
        .modal.active { display: flex; }
        
        .chat-container { 
            background: var(--bg-card); 
            width: 100%; 
            height: 85vh; 
            border-radius: 30px 30px 0 0; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .chat-header { 
            padding: 25px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .chat-header h3 { font-family: var(--font-serif); color: var(--accent-gold); }
        
        .chat-body { 
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 18px; 
            scrollbar-width: none;
        }
        .chat-body::-webkit-scrollbar { display: none; }
        
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 0.9rem; line-height: 1.5; position: relative; }
        .msg.admin { 
            background: #252525; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
            color: #eee;
        }
        .msg.user { 
            background: var(--accent-gold); 
            color: #000; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
            font-weight: 500;
        }
        
        .chat-input-area { 
            padding: 20px; 
            border-top: 1px solid rgba(255,255,255,0.05); 
            display: flex; 
            gap: 12px; 
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); 
            background: #1a1a1a;
        }
        .chat-input { 
            flex: 1; 
            background: #000; 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px 20px; 
            border-radius: 30px; 
            color: #fff; 
            outline: none; 
            font-family: var(--font-sans);
            font-size: 0.9rem;
        }
        .chat-input:focus { border-color: var(--accent-gold); }

        /* General Loaders */
        #loading, #paymentLoading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }
        /* Specific tweaks for payment overlay */
        #paymentLoading {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(5px);
            z-index: 6000; /* Needs to sit above everything else */
        }

        .loader-spin {
            width: 40px; height: 40px;
            border: 3px solid var(--accent-gold-soft);
            border-top: 3px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader-spin"></div>
        <p style="letter-spacing: 2px; font-size: 0.7rem; text-transform: uppercase; color: var(--accent-gold);">Elor Atelier</p>
    </div>

    <div id="paymentLoading" style="display: none;">
        <div class="loader-spin"></div>
        <p style="letter-spacing: 1px; font-size: 0.9rem; font-family: var(--font-serif); color: var(--accent-gold);">Payment Successful. Securing Order...</p>
    </div>

    <header class="header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i></a>
        <a href="index.html" class="logo">ELOR</a>
        <div style="width: 24px;"></div>
    </header>

    <main id="productContent" style="display: none;">
        <div class="product-hero">
            <div class="product-img-wrapper">
                <img id="pImage" src="" class="product-img" alt="Product">
            </div>
            <div class="product-details">
                <h1 class="product-title" id="pTitle"></h1>
                <div class="likes-counter">
                    <i class="fa-solid fa-heart"></i> <span id="likeText">0 likes</span>
                </div>
                <div class="product-price" id="pPrice"></div>
                <p class="product-desc" id="pDesc"></p>

                <div class="action-group">
                    <button class="btn-pay" onclick="ProductCtrl.initiatePayment()">  Order Now</button>
                    
                    <div class="secondary-actions">
                        <button class="btn-chat" onclick="ProductCtrl.openChat()">
                            <div class="pulse-dot" id="msgNotify"></div>
                            <i class="fa-regular fa-comment-dots"></i> Message Stylist
                        </button>
                        <button class="btn-like" id="likeBtn" onclick="ProductCtrl.toggleLike()">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="recom-section" id="recomWrapper" style="display: none;">
            <h2 class="section-title">Ensemble Selection</h2>
            <div class="grid" id="recomGrid"></div>
        </div>
    </main>

    <div class="modal" id="chatModal">
        <div class="chat-container">
            <div class="chat-header">
                <div>
                    <h3>Concierge</h3>
                    <small style="color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase;">Active Support</small>
                </div>
                <i class="fa-solid fa-xmark" style="font-size: 1.5rem; cursor: pointer;" onclick="ProductCtrl.closeChat()"></i>
            </div>
            <div class="chat-body" id="chatBody"></div>
            <form class="chat-input-area" onsubmit="ProductCtrl.handleMessageSubmit(event)">
                <input type="text" class="chat-input" id="chatInput" placeholder="Ask about sizing or custom fit..." autocomplete="off">
                <button type="submit" style="background:var(--accent-gold); border:none; width:48px; height:48px; border-radius:50%; color:#000; cursor:pointer;">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const ProductCtrl = (function() {
            const DB_URL = 'https://lxtoxjhcdtzuxyirzxpc.supabase.co';
            const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4dG94amhjZHR6dXh5aXJ6eHBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDU4OTAsImV4cCI6MjA5MTU4MTg5MH0.F5lDJVYUF4aEq8DwkafoWy56I_K6ccpkXiarBJk1LAo'; 
            const PAYSTACK_KEY = 'pk_live_1966d6eff8bc81b814c5332df40d24c7d0ba9460';
            
            const client = window.supabase.createClient(DB_URL, DB_KEY);
            let product = null;
            let user = null;
            let profile = null;
            let hasLiked = false;
            let chatPoller = null;

            const formatPrice = (num) => new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN', maximumFractionDigits: 0 }).format(num);

            return {
                                                async init() {
                    const id = new URLSearchParams(window.location.search).get('id');
                    if (!id) return window.location.href = 'index.html';

                    const { data: { session } } = await client.auth.getSession();
                    user = session?.user;

                    // 1. Fetch Product and Likes
                    const [pRes, likeRes] = await Promise.all([
                        client.from('products').select('*').eq('id', id).single(),
                        user ? client.from('product_likes').select('id').eq('product_id', id).eq('user_id', user.id) : null
                    ]);

                    product = pRes.data;
                    hasLiked = likeRes?.data?.length > 0;

                    // 2. Handle Profile (The Name Sync)
                    if (user) {
                        const { data: profileData } = await client.from('profiles').select('*').eq('id', user.id).single();
                        
                        if (!profileData) {
                            // Safely extract a name even if they use phone auth instead of email
                            const fallbackName = user.email ? user.email.split('@')[0] : 'Client';
                            const displayName = user.user_metadata?.full_name || fallbackName;

                            // Create profile if it doesn't exist so Admin sees a name
                            const { data: newProfile } = await client.from('profiles').upsert({
                                id: user.id,
                                full_name: displayName,
                                updated_at: new Date()
                            }).select().single();
                            profile = newProfile;
                        } else {
                            profile = profileData;
                        }
                    }

                    this.render();
                    this.loadRecommendations();
                    if (user) this.checkUnreadMessages();
                },
                
                render() {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('productContent').style.display = 'block';
                    document.getElementById('pImage').src = product.image_url;
                    document.getElementById('pTitle').innerText = product.name;
                    document.getElementById('pPrice').innerText = formatPrice(product.final_price);
                    document.getElementById('likeText').innerText = `${product.likes_count || 0} likes`;
                    document.getElementById('pDesc').innerText = product.description || 'Exclusive handmade attire, tailored to perfection.';
                    
                    if(hasLiked) document.getElementById('likeBtn').classList.add('active');
                },

                async loadRecommendations() {
                    const { data } = await client.from('products')
                        .select('*')
                        .eq('category', product.category)
                        .neq('id', product.id)
                        .limit(4);
                    
                    if (data && data.length > 0) {
                        const wrapper = document.getElementById('recomWrapper');
                        const grid = document.getElementById('recomGrid');
                        wrapper.style.display = 'block';
                        grid.innerHTML = data.map(p => `
                            <div class="card" onclick="window.location.href='product.html?id=${p.id}'">
                                <img src="${p.image_url}" alt="${p.name}">
                                <div class="card-info">
                                    <h4 class="card-title">${p.name}</h4>
                                    <p class="card-price">${formatPrice(p.final_price)}</p>
                                </div>
                            </div>
                        `).join('');
                    }
                },

                async checkUnreadMessages() {
                    const { data } = await client.from('stylist_chats')
                        .select('id')
                        .eq('user_id', user.id)
                        .eq('product_id', product.id)
                        .eq('sender', 'admin')
                        .eq('is_read', false);
                    
                    if (data?.length > 0) document.getElementById('msgNotify').classList.add('active');
                },

                async toggleLike() {
                    if (!user) return window.location.href = 'auth.html';
                    const btn = document.getElementById('likeBtn');
                    
                    if (hasLiked) {
                        await client.from('product_likes').delete().eq('product_id', product.id).eq('user_id', user.id);
                        btn.classList.remove('active');
                        product.likes_count--;
                    } else {
                        await client.from('product_likes').insert({ product_id: product.id, user_id: user.id });
                        btn.classList.add('active');
                        product.likes_count++;
                    }
                    hasLiked = !hasLiked;
                    document.getElementById('likeText').innerText = `${product.likes_count} likes`;
                },

                async handleInterest(status = 'Incomplete - Interested') {
                    if (!user) return;
                    
                    // Upsert into orders table (Ensure your Supabase table has the proper Unique constraints if using upsert onconflict)
                    await client.from('orders').upsert({
                        user_id: user.id,
                        product_id: product.id,
                        amount: product.final_price,
                        status: status,
                        reference: 'INT_' + Date.now()
                    }, { onConflict: 'user_id, product_id' }); 
                    // Note: If you face errors here later, it's likely because Supabase requires a explicit UNIQUE constraint on (user_id, product_id) in the database for the above "onConflict" to work properly.
                },

                async initiatePayment() {
    if (!user) return window.location.href = 'auth.html';

    if (!profile?.shipping_address || !profile?.measurements) {
        alert("Please complete your shipping address and measurements in your profile first.");
        return window.location.href = 'account.html';
    }

    const handler = PaystackPop.setup({
        key: PAYSTACK_KEY,
        email: user.email,
        amount: product.final_price * 100,
        currency: 'NGN',

        callback: (res) => {
            console.log("PAYSTACK SUCCESS:", res);
            ProductCtrl.processOrder(res);
        },

        onClose: () => {
            console.log("Payment closed by user");
        }
    });

    handler.openIframe();
},

async processOrder(res) {
    document.getElementById('paymentLoading').style.display = 'flex';

    try {
        const { error } = await client.from('orders').insert({
            user_id: user.id,
            product_id: product.id,
            amount: product.final_price,
            reference: res.reference + "_" + Date.now(),
            status: 'Ordered'
        });

        if (error) throw error;

        document.getElementById('paymentLoading').style.display = 'none';

        alert("✅ Order placed successfully!");
        window.location.href = 'orders.html';

    } catch (err) {
        console.error("ORDER ERROR:", err);
        alert("❌ Payment worked but order failed: " + err.message);
        document.getElementById('paymentLoading').style.display = 'none';
    }
},
                                async openChat() {
                    if (!user) return window.location.href = 'auth.html';
                    
                    // Define the display name
                    let displayName = profile?.full_name || user.user_metadata?.full_name || user.email.split('@')[0];
                    const firstName = displayName.split(' ')[0];

                    // Update the header
                    const chatTitle = document.querySelector('.chat-header h3');
                    if (chatTitle) chatTitle.innerText = `Concierge for ${firstName}`;

                    document.getElementById('chatModal').classList.add('active');
                    document.body.style.overflow = 'hidden';
                    
                    await this.handleInterest();
                    // Pass the name to loadChats
                    this.loadChats(firstName);
                    
                    await client.from('stylist_chats').update({ is_read: true })
                        .eq('user_id', user.id).eq('product_id', product.id).eq('sender', 'admin');
                    document.getElementById('msgNotify').classList.remove('active');

                    // Pass name to the poller too
                    chatPoller = setInterval(() => this.loadChats(firstName), 5000);
                },

                                async loadChats(userName = 'there') {
                    const { data } = await client.from('stylist_chats')
                        .select('*')
                        .eq('user_id', user.id)
                        .eq('product_id', product.id)
                        .order('created_at', { ascending: true });
                    
                    const body = document.getElementById('chatBody');
                    
                    if (!data || data.length === 0) {
                        // This now uses the userName passed from openChat
                        body.innerHTML = `<div class="msg admin">Greetings ${userName}. Do you have questions about the ${product.name}?</div>`;
                    } else {
                        body.innerHTML = data.map(m => `
                            <div class="msg ${m.sender}">${m.message}</div>
                        `).join('');
                    }
                    body.scrollTop = body.scrollHeight;
                },
                
                               async sendMessage() {
                    const input = document.getElementById('chatInput');
                    const msg = input.value.trim();
                    if (!msg) return;
                    
                    input.value = '';
                    
                    // Optimistic UI update: show message immediately
                    const body = document.getElementById('chatBody');
                    body.innerHTML += `<div class="msg user">${msg}</div>`;
                    body.scrollTop = body.scrollHeight;

                    const { error } = await client.from('stylist_chats').insert({
                        user_id: user.id, 
                        product_id: product.id, 
                        message: msg, 
                        sender: 'user',
                        is_read: false
                    });

                    if (error) console.error("Message error:", error.message);
                },

                // This function bridges the HTML form to the sendMessage logic
                handleMessageSubmit(e) {
                    e.preventDefault(); // Prevents page reload
                    this.sendMessage();
                },

                closeChat() { 
                    document.getElementById('chatModal').classList.remove('active'); 
                    document.body.style.overflow = 'auto';
                    clearInterval(chatPoller);
                }
            }; // End of return block
        })(); // End of ProductCtrl module

        // Global listener to kick everything off
        document.addEventListener('DOMContentLoaded', () => ProductCtrl.init());
        
        
    </script>
</body>
</html>
