<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELOR | Out of Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050505;
            --accent-gold: #D4AF37;
            --text-main: #F8F8FF;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        /* Ambient background movement */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212,175,55,0.07) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulseGlow 8s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-52%, -48%) scale(1.2); opacity: 0.8; }
        }

        .error-container {
            padding: 20px;
            max-width: 500px;
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Gold Shimmer Effect */
        .gold-glimmer {
            font-family: var(--font-serif);
            font-size: clamp(6rem, 15vw, 9rem);
            margin: 0;
            line-height: 1;
            background: linear-gradient(
                to right, 
                #BF953F, 
                #FCF6BA, 
                #B38728, 
                #FBF5B7, 
                #AA771C
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .message {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            margin: 20px 0 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInUp 1s forwards 0.5s;
        }

        .subtext {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 40px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInUp 1s forwards 0.8s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .return-btn {
            display: inline-block;
            padding: 15px 45px;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
            opacity: 0;
            animation: fadeInUp 1s forwards 1.1s;
        }

        .return-btn:hover {
            background: var(--accent-gold);
            color: #050505;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="error-container">
        <h1 class="gold-glimmer">404</h1>
        <p class="message">Out of Style</p>
        <p class="subtext">
            This collection piece is currently unavailable in the atelier.
        </p>
        <a href="index.html" class="return-btn">Return to Shop</a>
    </div>

</body>
</html>
